<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Galeria do Nosso Amor ❤️</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#ff9a9e,#fad0c4);
    text-align:center;
    color:#b30059;
    overflow-x:hidden;
}

/* Botões */
button {
    background: #ff9aa2;
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.3s, background 0.3s;
}

button:hover {
    background: #ff6f91;
    transform: scale(1.1);
    box-shadow: 0 0 10px #ff6f91;
}

/* Galeria */
.fotoContainer {
    display: none; /* Escondida por padrão */
    margin-top: 20px;
}

.fotoContainer img {
    width: 80%;
    max-width: 500px;
    border-radius: 15px;
    box-shadow: 0 0 15px black;
    margin: 10px;
    opacity:0;
    transition: opacity 0.8s ease;
}

/* Botão voltar */
#voltarBtn {
    display: block;
    margin: 20px auto;
}
</style>
</head>

<body>
<h1>Galeria do Nosso Amor ❤️</h1>
<p>Clique em uma categoria para ver nossas fotos!</p>

<!-- Botões das categorias -->
<div id="categorias">
  <!-- Serão gerados pelo JS -->
</div>

<!-- Container para exibir as fotos -->
<div id="fotoContainer" class="fotoContainer">
    <div id="fotosGaleria"></div>
    <button id="voltarBtn">Voltar 💖</button>
</div>

<script>
// Definindo categorias e fotos (edite os nomes das fotos)
const categorias = {
    "Encontros": ["encontro1.jpeg", "encontro2.jpeg", "encontro3.jpeg"],
    "Viagens": ["viagem1.jpeg", "viagem2.jpeg", "viagem3.jpeg"],
    "Datas Especiais": ["especial1.jpeg", "especial2.jpeg"],
    "Momentos Divertidos": ["divertido1.jpeg", "divertido2.jpeg", "divertido3.jpeg"],
    "Surpresas": ["surpresa1.jpeg", "surpresa2.jpeg"]
};

// Criar botões das categorias dinamicamente
const categoriasDiv = document.getElementById("categorias");
Object.keys(categorias).forEach((catName) => {
    const btn = document.createElement("button");
    btn.innerText = catName;
    btn.addEventListener("click", () => {
        mostrarCategoria(catName);
    });
    categoriasDiv.appendChild(btn);
});

// Função para mostrar a galeria de uma categoria
function mostrarCategoria(nome){
    const galeriaDiv = document.getElementById("fotosGaleria");
    galeriaDiv.innerHTML = ""; // Limpar fotos anteriores

    categorias[nome].forEach((foto) => {
        const img = document.createElement("img");
        img.src = foto;
        galeriaDiv.appendChild(img);
        setTimeout(()=>{ img.style.opacity = 1; }, 50);
    });

    document.getElementById("categorias").style.display = "none";
    document.getElementById("fotoContainer").style.display = "block";
}

// Botão voltar
document.getElementById("voltarBtn").addEventListener("click", () => {
    const galeriaDiv = document.getElementById("fotosGaleria");
    galeriaDiv.querySelectorAll("img").forEach(img => img.style.opacity = 0);
    setTimeout(()=>{
        document.getElementById("fotoContainer").style.display = "none";
        document.getElementById("categorias").style.display = "block";
    }, 300);
});
</script>

</body>
</html>
