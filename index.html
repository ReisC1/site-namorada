<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Para o Amor da Minha Vida ❤️</title>

<style>

body{
margin:0;
font-family: Arial;
background: linear-gradient(#ff9a9e,#fad0c4);
text-align:center;
color:white;
overflow:hidden;
}

.container{
margin-top:120px;
}

h1{
font-size:60px;
}

p{
font-size:24px;
}

#contador{
font-size:35px;
margin-top:20px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#ff1e4d;
}

.heart{
position: fixed;
top:-10px;
font-size:20px;
animation: cair linear infinite;
}

@keyframes cair{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<div class="container">

<h1>Eu te amo ❤️</h1>

<p>Esse site é só pra lembrar o quanto você é especial pra mim.</p>

<p>Estamos juntos há:</p>

<div id="contador"></div>

<button onclick="tocarMusica()">Tocar música 🎵</button>

</div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

const dataInicio = new Date("2024-01-01")

function atualizarContador(){

const agora = new Date()

const diff = agora - dataInicio

const dias = Math.floor(diff / (1000*60*60*24))

document.getElementById("contador").innerHTML = dias + " dias juntos 💖"

}

setInterval(atualizarContador,1000)

atualizarContador()

function tocarMusica(){
document.getElementById("musica").play()
}

function criarCoracao(){

const coracao = document.createElement("div")

coracao.classList.add("heart")

coracao.innerHTML="❤️"

coracao.style.left=Math.random()*100+"vw"

coracao.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(coracao)

setTimeout(()=>{
coracao.remove()
},5000)

}

setInterval(criarCoracao,300)

</script>

</body>
</html>
