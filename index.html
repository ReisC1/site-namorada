<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para o Amor da Minha Vida ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY NORMAL (SEM FLEX BUGANDO) */
body {
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* CENTRALIZA A CARTA */
.carta-container {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #ffafbd, #ffc3a0);
}

/* CARTA */
.carta {
    background: white;
    padding: 30px;
    border-radius: 10px;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* TEXTO PRETO */
.carta * {
    color: black;
}

/* BOTÃO */
.carta button {
    margin-top: 20px;
    padding: 12px 20px;
    background: #ff6f91;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* PÁGINA PRINCIPAL */
#paginaPrincipal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
}

/* VÍDEO CORRIGIDO */
#videoFundo {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: translate(-50%, -50%);
}

/* OVERLAY */
#overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* CONTEÚDO CENTRAL */
#conteudo {
    position: relative;
    z-index: 2;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
    color: white;
}

/* ANIMAÇÃO */
#conteudo h1,
#conteudo p,
#contador,
#conteudo img {
    opacity: 0;
    transition: 2s;
}

/* IMAGEM */
#conteudo img {
    margin-top: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px black;
}

/* BOTÕES */
button {
    margin-top: 10px;
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- CARTA -->
<div class="carta-container">
    <div class="carta">
        <h1>Uma Carta Para Você ❤️</h1>
        <p>
            Meu amor, <br><br>
            Esse site é pra te lembrar o quanto você é importante pra mim 💖
        </p>
        <button id="abrirSite">Abrir Surpresa 💕</button>
    </div>
</div>

<!-- SEGUNDA TELA -->
<div id="paginaPrincipal">

    <video autoplay muted loop playsinline id="videoFundo">
        <source src="video.mp4" type="video/mp4">
    </video>

    <div id="overlay"></div>

    <div id="conteudo">
        <h1>Eu te amo ❤️</h1>
        <p>Você é tudo pra mim</p>
        <p>Nos conhecemos em 20/10/2024</p>

        <img src="foto.jpeg" width="250">

        <p>Estamos juntos há:</p>
        <div id="contador"></div>

        <button id="playMusic">Tocar Música 🎶</button>
        <button id="stopMusic" disabled>Parar Música ✋</button>

        <audio id="backgroundMusic" loop>
            <source src="musica.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<script>
const botao = document.getElementById("abrirSite");
const cartaContainer = document.querySelector(".carta-container");
const pagina = document.getElementById("paginaPrincipal");

botao.onclick = () => {
    cartaContainer.style.display = "none";
    pagina.style.display = "block";

    setTimeout(() => {
        document.querySelector("#conteudo h1").style.opacity = 1;

        document.querySelectorAll("#conteudo p").forEach(p => {
            p.style.opacity = 1;
        });

        document.getElementById("contador").style.opacity = 1;
        document.querySelector("#conteudo img").style.opacity = 1;
    }, 300);
};

// CONTADOR
const dataInicio = new Date("2024-10-20");

function atualizar() {
    const dias = Math.floor((new Date() - dataInicio) / (1000*60*60*24));
    document.getElementById("contador").innerHTML = dias + " dias 💖";
}

setInterval(atualizar, 1000);
atualizar();

// MÚSICA
const play = document.getElementById("playMusic");
const stop = document.getElementById("stopMusic");
const audio = document.getElementById("backgroundMusic");

play.onclick = () => {
    audio.play();
    play.disabled = true;
    stop.disabled = false;
};

stop.onclick = () => {
    audio.pause();
    audio.currentTime = 0;
    play.disabled = false;
    stop.disabled = true;
};
</script>

</body>
</html>
