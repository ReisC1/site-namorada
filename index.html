<!DOCTYPE html>
<html>

<head>

<title>Para o Amor da Minha Vida ❤️</title>

<style>

body{
margin:0;aaa
font-family: Arial;
background: linear-gradient(#ff9a9e,#fad0c4);
text-align:center;
color:white;
overflow:hidden;
}

.container{
margin-top:100px;
}

h1{
font-size:60px;
}

p{
font-size:25px;
}

#contador{
font-size:35px;
margin-top:20px;
}

.heart{
position: fixed;
top:-10px;
color:red;
font-size:20px;
animation: cair 5s linear infinite;
}

@keyframes cair{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

</style>

</head>

<body>

<div class="container">

<h1>Eu te amo ❤️</h1>

<p>Esse site é só pra lembrar o quanto você é especial pra mim.</p>

<p>Estamos juntos há:</p>

<div id="contador"></div>

</div>

<script>

const dataInicio = new Date("2024-12-31")

function atualizarContador(){

const agora = new Date()

const diff = agora - dataInicio

const dias = Math.floor(diff / (1000*60*60*24))

document.getElementById("contador").innerHTML = dias + " dias 💖"

}

setInterval(atualizarContador,1000)

atualizarContador()


function criarCoracao(){

const coracao = document.createElement("div")

coracao.classList.add("heart")

coracao.innerHTML = "❤️"

coracao.style.left = Math.random()*100+"vw"

coracao.style.animationDuration = Math.random()*3+2+"s"

document.body.appendChild(coracao)

setTimeout(()=>{
coracao.remove()
},5000)

}

setInterval(criarCoracao,300)

</script>

</body>

</html>
