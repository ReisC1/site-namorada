```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Para o Amor da Minha Vida ❤️</title>

<style>

body{
margin:0;
font-family: Arial;
background: linear-gradient(#ff9a9e,#fad0c4);
text-align:left;
color:red;
overflow:hidden;
}

.container{
margin-top:100px;
}

h1{
font-size:55px;
}

p{
font-size:24px;
}

#contador{
font-size:35px;
margin-top:20px;
}

img{
width:280px;
border-radius:20px;
box-shadow:0 0 15px black;
margin-top:20px;
}

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:cair linear infinite;
}

@keyframes cair{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<iframe width="0" height="0"
src="https://www.youtube.com/watch?v=2Vv-BfVoq4g&list=RDrtOvBOTyX00&index=4"
frameborder="0"
allow="autoplay">
</iframe>

<div class="container">

<h1>Eu te amo ❤️</h1>

<p>Esse site é só para lembrar o quanto você é especial pra mim.</p>
<p> Nos conhecemos em 20/10/2024</p>
<img src="foto.jpeg">

<p>Estamos juntos há:</p>

<div id="contador"></div>

</div>

<script>

const dataInicio = new Date("2024-01-31")

function atualizarContador(){

const agora = new Date()

const diff = agora - dataInicio

const dias = Math.floor(diff/(1000*60*60*24))

document.getElementById("contador").innerHTML =
dias + " dias juntos 💖"

}

setInterval(atualizarContador,1000)

atualizarContador()

function criarCoracao(){

const coracao = document.createElement("div")

coracao.classList.add("heart")

coracao.innerHTML="❤️"

coracao.style.left=Math.random()*100+"vw"

coracao.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(coracao)

setTimeout(()=>{
coracao.remove()
},5000)

}

setInterval(criarCoracao,300)

</script>

</body>
</html>
```
