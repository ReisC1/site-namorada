<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para o Amor da Minha Vida ❤️</title>
<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    color: white;
    overflow-x: hidden;
    background: linear-gradient(to bottom, #ffafbd, #ffc3a0);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Carta */
.carta {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: white;
    width: 80%;
    max-width: 600px;
    padding: 20px 30px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    text-align: center;
    animation: surgir 1.2s ease forwards;
    color: #333;
}

.carta h1 {
    font-family: 'Georgia', serif;
    font-size: 30px;
    margin-bottom: 20px;
    color: #ff6f91;
}

.carta p {
    font-size: 18px;
    line-height: 1.6;
    color: #555;
}

.carta button {
    background: #ff6f91;
    color: white;
    border: none;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}
.carta button:hover {
    background: #ff4567;
    transform: scale(1.05);
}

@keyframes surgir {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* Página principal */
#paginaPrincipal {
    display: none;
    text-align: center;
    height: 100vh;
    background: black;
    padding: 20px;
}

/* Vídeo */
#videoFundo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: -1;
}

/* Overlay */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* Conteúdo */
#conteudo {
    position: relative;
    z-index: 1;
}

h1 {
    font-size: 55px;
    margin-top: 40px;
    opacity: 0;
    transition: 2s;
    text-shadow: 0 0 10px #ff6f91;
}

p {
    font-size: 24px;
    opacity: 0;
    transition: 2s;
}

#contador {
    font-size: 35px;
    margin-top: 20px;
    opacity: 0;
    transition: 2s;
}

img {
    opacity: 0;
    transition: 2s;
    margin-top: 20px;
}

/* Botões */
button {
    background: rgba(255,154,162,0.8);
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}
button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="carta">
  <h1>Uma Carta Para Você ❤️</h1>
  <p>
    Meu amor, <br><br>
    Desde o momento em que nos conhecemos, meu mundo ficou mais bonito, mais leve e mais feliz. 
    Esse site é um presente para te lembrar o quanto você é importante para mim. ❤️
  </p>
  <button id="abrirSite">Abrir Surpresa 💕</button>
</div>

<div id="paginaPrincipal">

    <video autoplay muted loop playsinline id="videoFundo">
      <source src="video.mp4" type="video/mp4">
    </video>

    <div id="overlay"></div>

    <div id="conteudo">
      <h1>Eu te amo ❤️</h1>
      <p>Você é tudo pra mim</p>
      <p>Nos conhecemos em 20/10/2024</p>

      <img src="foto.jpeg" width="280">

      <p>Estamos juntos há:</p>
      <div id="contador"></div>

      <button id="playMusic">Tocar Música 🎶</button>
      <button id="stopMusic" disabled>Parar Música ✋</button>

      <audio id="backgroundMusic" loop>
        <source src="musica.mp3" type="audio/mpeg">
      </audio>
    </div>
</div>

<script>
const botaoAbrir = document.getElementById("abrirSite");
const carta = document.querySelector(".carta");
const paginaPrincipal = document.getElementById("paginaPrincipal");

botaoAbrir.addEventListener("click", () => {
    carta.style.display = "none";
    paginaPrincipal.style.display = "block";

    setTimeout(() => {
        document.querySelector("h1").style.opacity = 1;

        document.querySelectorAll("#conteudo p").forEach(p => {
            p.style.opacity = 1;
        });

        document.getElementById("contador").style.opacity = 1;
        document.querySelector("img").style.opacity = 1;
    }, 300);
});

// contador corrigido
const dataInicio = new Date("2024-10-20");

function atualizarContador() {
    const agora = new Date();
    const dias = Math.floor((agora - dataInicio) / (1000*60*60*24));
    document.getElementById("contador").innerHTML = dias + " dias 💖";
}

setInterval(atualizarContador, 1000);
atualizarContador();

// música
const play = document.getElementById("playMusic");
const stop = document.getElementById("stopMusic");
const audio = document.getElementById("backgroundMusic");

play.onclick = () => {
    audio.play();
    play.disabled = true;
    stop.disabled = false;
};

stop.onclick = () => {
    audio.pause();
    audio.currentTime = 0;
    play.disabled = false;
    stop.disabled = true;
};
</script>

</body>
</html>
