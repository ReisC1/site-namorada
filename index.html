<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para o Amor da Minha Vida ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    color: white;
    overflow-x: hidden;
    background: linear-gradient(to bottom, #ffafbd, #ffc3a0);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARTA */
.carta {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: white;
    width: 80%;
    max-width: 600px;
    padding: 20px 30px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    text-align: center;
    animation: surgir 1.2s ease forwards;
}

/* COR DA CARTA */
.carta * {
    color: black;
}

/* botão */
.carta button {
    background: #ff6f91;
    color: white;
    border: none;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}

@keyframes surgir {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* PÁGINA PRINCIPAL */
#paginaPrincipal {
    display: none;
    text-align: center;
    height: 100vh;
    background: black;
}

/* vídeo */
#videoFundo {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: -1;
}

/* overlay */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* conteúdo */
#conteudo {
    position: relative;
    z-index: 1;
}

/* 🔥 AGORA SÓ A SEGUNDA TELA COMEÇA INVISÍVEL */
#conteudo h1 {
    opacity: 0;
    transition: 2s;
}

#conteudo p {
    opacity: 0;
    transition: 2s;
}

#contador {
    opacity: 0;
    transition: 2s;
}

#conteudo img {
    opacity: 0;
    transition: 2s;
}

/* botões */
button {
    background: rgba(255,154,162,0.8);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- CARTA -->
<div class="carta">
  <h1>Uma Carta Para Você ❤️</h1>
  <p>
    Meu amor, <br><br>
    Desde o momento em que nos conhecemos, meu mundo ficou mais bonito, mais leve e mais feliz. 
    Esse site é um presente para te lembrar o quanto você é importante para mim. ❤️
  </p>
  <button id="abrirSite">Abrir Surpresa 💕</button>
</div>

<!-- PÁGINA PRINCIPAL -->
<div id="paginaPrincipal">

<video autoplay muted loop playsinline id="videoFundo">
  <source src="video.mp4" type="video/mp4">
</video>

<div id="overlay"></div>

<div id="conteudo">
  <h1>Eu te amo ❤️</h1>
  <p>Você é tudo pra mim</p>
  <p>Nos conhecemos em 20/10/2024</p>

  <img src="foto.jpeg" width="280">

  <p>Estamos juntos há:</p>
  <div id="contador"></div>

  <button id="playMusic">Tocar Música 🎶</button>
  <button id="stopMusic" disabled>Parar Música ✋</button>

  <audio id="backgroundMusic" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>
</div>

</div>

<script>
const botaoAbrir = document.getElementById("abrirSite");
const carta = document.querySelector(".carta");
const paginaPrincipal = document.getElementById("paginaPrincipal");

botaoAbrir.onclick = () => {
    carta.style.display = "none";
    paginaPrincipal.style.display = "block";

    setTimeout(() => {
        document.querySelector("#conteudo h1").style.opacity = 1;

        document.querySelectorAll("#conteudo p").forEach(p => {
            p.style.opacity = 1;
        });

        document.getElementById("contador").style.opacity = 1;
        document.querySelector("#conteudo img").style.opacity = 1;
    }, 300);
};

// CONTADOR
const dataInicio = new Date("2024-10-20");

function atualizarContador() {
    const dias = Math.floor((new Date() - dataInicio) / (1000*60*60*24));
    document.getElementById("contador").innerHTML = dias + " dias 💖";
}

setInterval(atualizarContador, 1000);
atualizarContador();

// MÚSICA
const play = document.getElementById("playMusic");
const stop = document.getElementById("stopMusic");
const audio = document.getElementById("backgroundMusic");

play.onclick = () => {
    audio.play();
    play.disabled = true;
    stop.disabled = false;
};

stop.onclick = () => {
    audio.pause();
    audio.currentTime = 0;
    play.disabled = false;
    stop.disabled = true;
};
</script>

</body>
</html>
