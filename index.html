```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para o Amor da Minha Vida ❤️</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#ff9a9e,#fad0c4);
  text-align:center;
  color:white;
  overflow:hidden;
}

.container{
  margin-top:120px;
}

h1{
  font-size:60px;
}

p{
  font-size:24px;
}

#contador{
  font-size:35px;
  margin-top:20px;
}

img{
  width:260px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 0 12px rgba(0,0,0,.4);
}

.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:cair linear infinite;
}

@keyframes cair{
  0%{transform:translateY(0);}
  100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<!-- Música do YouTube tocando invisível -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/rtOvBOTyX00?autoplay=1&loop=1&playlist=rtOvBOTyX00"
frameborder="0"
allow="autoplay">
</iframe>

<div class="container">
<h1>Eu te amo ❤️</h1>

<p>Esse site é só para lembrar o quanto você é especial para mim.</p>

<img src="foto.jpg" alt="Nós dois">

<p>Estamos juntos há:</p>

<div id="contador"></div>
</div>

<script>

const dataInicio = new Date("2024-01-01");

function atualizarContador(){
  const agora = new Date();
  const diff = agora - dataInicio;
  const dias = Math.floor(diff / (1000*60*60*24));
  document.getElementById("contador").innerHTML =
  dias + " dias juntos 💖";
}

setInterval(atualizarContador,1000);
atualizarContador();

function criarCoracao(){
  const coracao = document.createElement("div");
  coracao.classList.add("heart");
  coracao.innerHTML = "❤️";
  coracao.style.left = Math.random()*100+"vw";
  coracao.style.animationDuration =
  (Math.random()*3+2)+"s";

  document.body.appendChild(coracao);

  setTimeout(()=>{
    coracao.remove();
  },5000);
}

setInterval(criarCoracao,300);

</script>

</body>
</html>
```
