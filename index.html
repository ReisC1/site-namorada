<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Galeria do Nosso Amor ❤️</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#ff9a9e,#fad0c4);
    text-align:center;
    color:#b30059;
    overflow-x:hidden;
}

/* Botões */
button {
    background: #ff9aa2;
    color: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.3s, background 0.3s;
}

button:hover {
    background: #ff6f91;
    transform: scale(1.1);
    box-shadow: 0 0 10px #ff6f91;
}

/* Fotos */
.fotoContainer {
    display: none; /* Escondida por padrão */
    margin-top: 20px;
}

.fotoContainer img {
    width: 80%;
    max-width: 500px;
    border-radius: 15px;
    box-shadow: 0 0 15px black;
    opacity:0;
    transition: opacity 0.8s ease;
}

/* Botão voltar */
#voltarBtn {
    display: block;
    margin: 20px auto;
}
</style>
</head>

<body>

<h1>Galeria do Nosso Amor ❤️</h1>
<p>Clique nos botões para ver nossas fotos!</p>

<!-- Botões das 21 fotos -->
<div id="botoes">
  <!-- Os botões serão gerados automaticamente pelo JS -->
</div>

<!-- Container para exibir a foto -->
<div id="fotoContainer" class="fotoContainer">
    <img id="fotoGrande" src="" alt="Foto do casal">
    <button id="voltarBtn">Voltar 💖</button>
</div>

<script>
// Array com os nomes das fotos (substitua com os nomes reais)
const fotos = [];
for(let i=1; i<=21; i++){
    fotos.push(`foto${i}.jpeg`);
}

// Criar os botões dinamicamente
const botoesDiv = document.getElementById("botoes");
fotos.forEach((foto, index) => {
    const btn = document.createElement("button");
    btn.innerText = `Foto ${index+1}`;
    btn.addEventListener("click", () => {
        mostrarFoto(index);
    });
    botoesDiv.appendChild(btn);
});

// Função para mostrar a foto
function mostrarFoto(index){
    document.getElementById("fotoGrande").src = fotos[index];
    document.getElementById("botoes").style.display = "none";
    const container = document.getElementById("fotoContainer");
    container.style.display = "block";
    // Fade-in da foto
    setTimeout(()=>{ document.getElementById("fotoGrande").style.opacity = 1; }, 50);
}

// Botão voltar
document.getElementById("voltarBtn").addEventListener("click", () => {
    const img = document.getElementById("fotoGrande");
    img.style.opacity = 0; // fade-out
    setTimeout(()=>{
        document.getElementById("fotoContainer").style.display = "none";
        document.getElementById("botoes").style.display = "block";
    }, 300);
});
</script>

</body>
</html>
